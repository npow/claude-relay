server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://host.docker.internal:3100/loki/api/v1/push
    external_labels:
      job: claude-relay
      env: local

scrape_configs:
  - job_name: claude-relay-file
    static_configs:
      - targets:
          - localhost
        labels:
          service: claude-relay
          source: local-file
          __path__: /var/log/claude-relay/relay.log
